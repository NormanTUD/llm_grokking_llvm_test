name: Check train.py

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run test
        run: |
          ./test.sh
